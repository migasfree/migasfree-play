permissions:
  contents: write

name: Build WPT Package

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-wpt:
    name: Build WPT Package on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install Node.js dependencies
        run: |
          yarnpkg install --frozen-lockfile

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Install WPT directly from GitHub so the 'wpt' command is available
          pip install git+https://github.com/migasfree/windows-package-tool.git

      - name: Build WPT Package
        run: |
          python packaging/wpt/build_wpt.py

      - name: Upload WPT Artifact
        uses: actions/upload-artifact@v6
        with:
          name: migasfree-play-wpt-package
          path: packaging/wpt/*.tar.gz

      - name: Release WPT Package
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: packaging/wpt/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
